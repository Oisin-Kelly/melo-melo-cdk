name: E2E

# Deploys the full app to an ephemeral `test` environment, provisions Cognito
# test users, runs the Playwright API suite against it, then tears everything
# down (destroy runs even when the tests fail).
on:
  push:

permissions:
  id-token: write
  contents: read

# Stack names are fixed (*-test), so two runs can't share the environment
concurrency:
  group: e2e-test-env
  cancel-in-progress: false

env:
  ENVIRONMENT: test
  AWS_REGION: eu-west-1

jobs:
  e2e:
    # arm64 runner: the lambdas are linux-arm64 native AOT, so the docker build
    # runs natively instead of under QEMU emulation
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@517a711dbcd0e402f90c77e7e2f81e849156e31d
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-1

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1
        with:
          dotnet-version: 10.0.x

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 22

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Build lambdas (native arm64 AOT)
        run: ./scripts/build-lambdas.sh

      - name: Deploy test stacks
        id: deploy
        run: |
          USE_PREBUILT=1 cdk deploy --all --require-approval never \
            --outputs-file cdk-outputs.json

      - name: Write e2e/.env from CDK outputs
        run: |
          API_BASE_URL=$(jq -re '."api-stack-test".ApiBaseUrl' cdk-outputs.json | sed 's:/*$::')
          USER_POOL_ID=$(jq -re '."auth-stack-test".UserPoolId' cdk-outputs.json)
          CLIENT_ID=$(jq -re '."auth-stack-test".UserPoolClientId' cdk-outputs.json)
          cat > e2e/.env <<EOF
          API_BASE_URL=$API_BASE_URL
          COGNITO_USER_POOL_ID=$USER_POOL_ID
          COGNITO_CLIENT_ID=$CLIENT_ID
          AWS_REGION=${AWS_REGION}
          EOF

      # Random per-run passwords that satisfy the pool policy (upper/lower/digit/symbol)
      - name: Generate test accounts
        run: |
          jq -n \
            --arg a "Aa1!$(openssl rand -hex 12)" \
            --arg b "Aa1!$(openssl rand -hex 12)" \
            --arg c "Aa1!$(openssl rand -hex 12)" \
            '{userA: {username: "melotesta", password: $a},
              userB: {username: "melotestb", password: $b},
              userC: {username: "melotestc", password: $c}}' \
            > e2e/test-accounts.json

      - name: Provision Cognito test users
        run: ./e2e/setup-test-users.sh

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      - name: Run API e2e tests
        working-directory: e2e
        run: npx playwright test --project=api

      - name: Destroy test stacks
        if: always() && steps.deploy.outcome != 'skipped'
        run: USE_PREBUILT=1 cdk destroy --all --force
